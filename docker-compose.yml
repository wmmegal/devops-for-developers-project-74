services:
  app:
    image: wmmegal/devops-for-developers-project-74
    build:
      context: .
      dockerfile: Dockerfile.production
    command: ["make", "test"]
    ports:
      - "8080:8080"
    depends_on:
      - db
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres,
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5